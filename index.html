<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>⚡ PABLO & ARIELE SIMULATOR ⚡</title>
<style>
body {
    margin:0;
    padding:0;
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color:#0ff;
}
h1 {
    text-align:center;
    font-size:48px;
    color:#0ff;
    text-shadow:0 0 5px #0ff,0 0 15px #0ff,0 0 25px #00f;
    margin:30px 0;
}
#menu-container {
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}
button {
    padding:15px 35px;
    border:2px solid #0ff;
    border-radius:12px;
    background:#001f2d;
    color:#0ff;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    text-shadow:0 0 5px #0ff;
}
button:hover {
    background:#0ff;
    color:#001f2d;
    transform:scale(1.05);
    box-shadow:0 0 15px #0ff,0 0 25px #0ff inset;
}
#output {
    background: rgba(0,0,0,0.85);
    margin:auto;
    max-width:800px;
    min-height:300px;
    padding:25px;
    border-radius:18px;
    box-shadow:0 0 20px #0ff,0 0 40px #0ff inset;
    font-size:16px;
    color:#0ff;
    text-shadow:0 0 5px #0ff;
    line-height:1.6;
    overflow-y:auto;
}
input[type=text] {
    padding:10px;
    border-radius:10px;
    border:2px solid #0ff;
    background:#001f2d;
    color:#0ff;
    margin-right:10px;
    font-size:16px;
}
.fade {animation: fadeIn 1s forwards;}
@keyframes fadeIn {from{opacity:0;} to{opacity:1;}}
</style>
</head>
<body>

<h1>⚡ PABLO & ARIELE SIMULATOR ⚡</h1>

<div id="menu-container">
    <button onclick="showMenu()">/menu</button>
    <button onclick="pablo()">/pablo</button>
    <button onclick="loveGenerator()">/lovegenerator</button>
    <button onclick="cartinhas()">/cartinhas</button>
</div>

<div id="output">
    ⚙️ Bem-vindo! Use os comandos acima para iniciar a simulação...
</div>

<script>
const output=document.getElementById('output');

// ================= MENU =================
function showMenu(){
    output.innerHTML='';
    const menuText=document.createElement('div');
    menuText.className='fade';
    menuText.innerHTML="📜 Comandos disponíveis:<br>⚡ /pablo - Interaja com Pablo<br>💖 /lovegenerator - Descubra porcentagem de amor<br>✉️ /cartinhas - Receba uma cartinha personalizada<br>🔄 /menu - Mostrar este menu novamente";
    output.appendChild(menuText);
}

// ================= /PABLO =================
function pablo(){
    output.innerHTML='';
    const pergunta=document.createElement('div');
    pergunta.className='fade';
    pergunta.innerHTML="💬 Pablo: Você é a Ariele? (sim/não)";
    output.appendChild(pergunta);

    const input=document.createElement('input');
    input.type='text';
    input.placeholder='Digite sim ou não';
    output.appendChild(input);

    const btn=document.createElement('button');
    btn.innerText='⧉ Enviar ⧉';
    output.appendChild(btn);

    btn.onclick=()=>{
        const val=input.value.trim().toLowerCase();
        if(val==='sim'){
            output.innerHTML='';
            const mensagens=[
                "✨ ⧉ Pablo está radiante! Você ilumina o dia dele! 🌟",
                "💖 ⧉ Ele acha você incrível, divertida e única! 🔹",
                "🌹 ⧉ Cada momento com você é inesquecível! 💫",
                "💌 ⧉ Ele envia abraços e sorrisos infinitos! 🔹"
            ];
            mensagens.forEach((m,i)=>{
                setTimeout(()=>{
                    const d=document.createElement('div');
                    d.className='fade';
                    d.innerHTML=m;
                    output.appendChild(d);
                }, i*1300);
            });
        } else {
            output.innerHTML="💔 ⧉ Pablo está triste...";
        }
    };
}

// ================= /LOVE GENERATOR =================
function loveGenerator(){
    output.innerHTML='';
    const label=document.createElement('div');
    label.className='fade';
    label.innerHTML='💖 Digite as iniciais (Ex: A+P):';
    output.appendChild(label);

    const input=document.createElement('input');
    input.type='text';
    input.placeholder='Ex: A+P';
    output.appendChild(input);

    const btn=document.createElement('button');
    btn.innerText='⧉ Calcular ⧉';
    output.appendChild(btn);

    btn.onclick=()=>{
        const val=input.value.trim().toUpperCase().replace(/\s/g,'');
        if(!val.includes('+') || val.length<3){
            output.innerHTML='❌ Error: Bota as iniciais aí!';
            return;
        }
        const parts=val.split('+');
        const c1=parts[0];
        const c2=parts[1];

        let percent;
        if((c1==='A' && c2==='P')||(c1==='P' && c2==='A')) percent=100;
        else if((c1==='L' && c2==='J')||(c1==='J' && c2==='L')) percent=Math.random()<0.67?100:Math.floor(Math.random()*101);
        else percent=Math.floor(Math.random()*101);

        output.innerHTML='';
        const resultado=document.createElement('div');
        resultado.className='fade';
        output.appendChild(resultado);

        let count=0;
        const interval=setInterval(()=>{
            if(count>percent) clearInterval(interval);
            resultado.innerHTML=`💘 Amor entre ${c1}+${c2}: ${count}% ⧉`;
            count++;
        },20);
    };
}

// ================= /CARTINHAS =================
function cartinhas(){
    output.innerHTML='';
    const pergunta=document.createElement('div');
    pergunta.className='fade';
    pergunta.innerHTML="👤 A cartinha é para um homem ou uma mulher?";
    output.appendChild(pergunta);

    const input=document.createElement('input');
    input.type='text';
    input.placeholder='homem/mulher';
    output.appendChild(input);

    const btn=document.createElement('button');
    btn.innerText='⧉ Enviar ⧉';
    output.appendChild(btn);

    btn.onclick=()=>{
        const val=input.value.trim().toLowerCase();
        let cartas;
        if(val==='homem'){
            cartas=[
                "🌟 ⧉ Ele é incrível, talentoso e forte! 💪",
                "⚡ ⧉ Nunca duvide de sua coragem e inteligência! ✨",
                "💌 ⧉ Um abraço virtual cheio de energia positiva! 🔹"
            ];
        } else if(val==='mulher'){
            cartas=[
                "🌹 ⧉ Ela é maravilhosa, brilhante e cheia de vida! 💫",
                "💖 ⧉ Todos ao redor sentem sua alegria contagiante! ✨",
                "💌 ⧉ Um abraço virtual cheio de carinho e luz! 🔹"
            ];
        } else {
            output.innerHTML="❌ Error: Responda homem ou mulher!";
            return;
        }

        output.innerHTML='';
        cartas.forEach((c,i)=>{
            setTimeout(()=>{
                const d=document.createElement('div');
                d.className='fade';
                d.style.fontSize='18px';
                d.innerHTML=c;
                output.appendChild(d);
            }, i*1400);
        });
    };
}
</script>
</body>
  </html>
